name: Deploy to GitHub Pages

on:
    push:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            # ─── Root site (awesomeworks.ai/) ───
            - name: Install root deps
              run: npm install

            - name: Build root site
              run: npm run build
              env:
                  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
                  GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}

            # ─── Sub-app: Metyra (awesomeworks.ai/metyra/) ───
            - name: Install metyra-app deps
              working-directory: metyra-app
              run: npm install

            - name: Build metyra-app
              working-directory: metyra-app
              run: npm run build
              env:
                  PUBLIC_METYRA_API_BASE: ${{ vars.PUBLIC_METYRA_API_BASE }}

            - name: Merge metyra-app dist into root dist
              run: |
                  mkdir -p dist/metyra
                  cp -r metyra-app/dist/* dist/metyra/

            # ─── Sub-app: Ask landing (awesomeworks.ai/ask/) ───
            - name: Install ask-app deps
              working-directory: ask-app
              run: npm install

            - name: Build ask-app
              working-directory: ask-app
              run: npm run build

            - name: Merge ask-app dist into root dist
              run: |
                  mkdir -p dist/ask
                  cp -r ask-app/dist/* dist/ask/

            - name: Setup Pages
              uses: actions/configure-pages@v4

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: "./dist"

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
